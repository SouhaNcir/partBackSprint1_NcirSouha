<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
       xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	   xmlns:sec=https://www.thymeleaf.org/thymeleaf-extras-springsecurity6>
<link rel="stylesheet" type="text/css"
href="webjars/bootstrap/4.3.1/css/bootstrap.min.css" />

<head>
	<meta charset="utf-8">
	<title>Liste des Voitures</title>
</head>

<body>
	<div th:replace="template"></div>
	<div class="container mt-5">
		<div class="card">
			<div class="card-header">
				Liste des Voitures
			</div>
			<div class="card-body">

				<table class="table table-striped">
					<tr>
						<th>ID</th>
						<th>Boite Vitesse</th>
						<th>Modele Voiture</th>
						<th>Couleur</th>
						<th>Date de fabrication</th>
						<th>Type Carburant</th>
						<th>Prix</th>
						<th>Marque</th>
					</tr>
					<tr th:each="v : ${voitures.content}">
						<td th:text="${v.getIdVoiture()}"></td>
						<td th:text="${v.getBoiteVitesse()}"></td>
						<td th:text="${v.getModele()}"></td>
						<td th:text="${v.getCouleur()}"></td>
						<td th:text="${v.getDateFabrication()}"></td>
						<td th:text="${v.getTypeCarburant()}"></td>
						<td th:text="${v.getPrixVoiture()}"></td>
						<td th:if= "${!#strings.isEmpty(v.marque)}" th:text="${v.marque.nomMar}"></td>
						<td th:if= "${#strings.isEmpty(v.marque)}" th:text="${'Pas de Marque'}"></td>
						<td sec:authorize="hasAuthority('ADMIN')">
						<a class="btn btn-success"
						   th:href="@{/modifierVoiture(id=${v.idVoiture},page=${currentPage},size=${size})}">
						   Editer
						</a>
						</td>
						<td sec:authorize="hasAuthority('ADMIN')"><a class="btn btn-danger" onclick="return confirm('Etes-vous sûr ?')"  th:href="@{supprimerVoiture(id=${v.getIdVoiture()},
						page=${currentPage},size=${size})}">Supprimer</a>
				       </td>

					</tr>
				</table>
				<ul class="nav nav-pills">
				    <li th:each="page, status : ${pages}">
				        <a th:class="${status.index == currentPage ? 'btn btn-primary' : 'btn'}"
				           th:href="@{/listeVoitures(page=${status.index}, size=${size})}"
				           th:text="${status.index}">
				        </a>
				    </li>
				</ul>

			</div>
		</div>
	</div>
</body>
</html>
