<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
	<meta charset="utf-8">
	<title>Modifier Voiture</title>

	<link rel="stylesheet" type="text/css" th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}" />

</head>

<body>

	<div th:replace="template"></div>

	<div class="container mt-5">

		<div class="card">

			<div class="card-header">
				Modifier Voiture
			</div>

			<div class="card-body">

				<form th:action="@{/saveVoiture}" method="post">

					<!-- ID caché -->
					<div class="form-group">
						<label hidden>ID Voiture</label>
						<input type="hidden" name="idVoiture" class="form-control" th:value="${voiture.idVoiture}" />
					</div>

					<!-- Modele -->
					<div class="form-group">
						<label class="control-label">Modele Voiture :</label>
						<input type="text" name="modele" class="form-control" th:value="${voiture.modele}" />

						<span th:errors="${voiture.modele}" class="text-danger"></span>
					</div>

					<!-- Couleur -->
					<div class="form-group">
						<label class="control-label">Couleur :</label>
						<input type="text" name="couleur" class="form-control" th:value="${voiture.couleur}" />
					</div>

					<!-- Type carburant -->
					<div class="form-group">
						<label class="control-label">Type Carburant :</label>
						<input type="text" name="typeCarburant" class="form-control"
							th:value="${voiture.typeCarburant}" />
					</div>

					<!-- Boite vitesse -->
					<div class="form-group">
						<label class="control-label">Boite Vitesse :</label>
						<input type="text" name="boiteVitesse" class="form-control"
							th:value="${voiture.boiteVitesse}" />
					</div>

					<!-- Prix -->
					<div class="form-group">
						<label class="control-label">Prix Voiture :</label>
						<input type="text" name="prixVoiture" class="form-control" th:value="${voiture.prixVoiture}" />

						<span th:errors="${voiture.prixVoiture}" class="text-danger"></span>
					</div>

					<!-- Date fabrication -->
					<div class="form-group">
						<label class="control-label">Date Fabrication :</label>
						<input type="date" name="dateFabrication" class="form-control"
							th:value="${voiture.dateFabrication}" />

						<span th:errors="${voiture.dateFabrication}" class="text-danger"></span>
					</div>

					<div>
						<button type="submit" class="btn btn-primary">
							Modifier
						</button>
					</div>

				</form>

			</div>
		</div>
	</div>

</body>

</html>
